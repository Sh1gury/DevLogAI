services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: devlog
      POSTGRES_USER: devlog
      POSTGRES_PASSWORD: devlog_password
    ports:
      - "5432:5432"
    volumes:
      - devlog_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlog -d devlog"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  devlog_pgdata:
